services:
  gov-crawler:
    build: .
    container_name: gov-crawler
    ports:
      - "7107:7107"
    env_file: .env
    environment:
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=16379
      - REDIS_DB=0
      - REDIS_PASSWORD=mypassword123
      - WORKER_COUNT=3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
