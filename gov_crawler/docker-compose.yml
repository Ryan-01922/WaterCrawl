services:
  gov-crawler:
    build: .
    container_name: gov-crawler
    ports:
      - "7107:7107"
    env_file: .env
    environment:
      - REDIS_URL=redis://gov-redis:6379/0
      - WORKER_COUNT=3
    depends_on:
      - gov-redis
    restart: unless-stopped

  gov-redis:
    image: redis:7-alpine
    container_name: gov-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
