<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gov Crawler - 测试页面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 24px; color: #1a1a2e; }
.card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 18px; margin-bottom: 12px; color: #1a1a2e; }
.config-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.config-row label { font-weight: 600; min-width: 80px; line-height: 36px; }
.config-row select, .config-row input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.btn { padding: 10px 24px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: #4361ee; color: #fff; }
.btn-success { background: #2ecc71; color: #fff; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px; border-radius: 8px; flex-wrap: wrap; }
.status-idle { background: #e8f4fd; color: #2196F3; }
.status-pending { background: #f3e5f5; color: #9c27b0; }
.status-running { background: #fff3e0; color: #ff9800; }
.status-finished { background: #e8f5e9; color: #4caf50; }
.status-failed { background: #fbe9e7; color: #f44336; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.dot-idle { background: #2196F3; }
.dot-pending { background: #9c27b0; }
.dot-running { background: #ff9800; animation: pulse 1s infinite; }
.dot-finished { background: #4caf50; }
.dot-failed { background: #f44336; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.task-id-tag { font-size: 12px; background: #e0e0e0; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
.article-list { list-style: none; }
.article-item { border-bottom: 1px solid #eee; padding: 12px 0; }
.article-item:last-child { border-bottom: none; }
.article-title { font-weight: 600; margin-bottom: 4px; }
.article-url { font-size: 12px; color: #888; word-break: break-all; }
.article-meta { font-size: 13px; color: #555; margin-top: 2px; }
.article-meta .meta-label { font-weight: 600; color: #333; }
.article-content { margin-top: 8px; padding: 12px; background: #f9f9f9; border-radius: 6px; font-size: 13px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
.hint { font-size: 12px; color: #888; margin-top: 4px; }
.summary-box { padding: 16px; background: linear-gradient(135deg, #667eea15, #764ba215); border-radius: 8px; border-left: 4px solid #4361ee; margin-bottom: 16px; font-size: 14px; line-height: 1.8; }
.summary-box .summary-label { font-weight: 700; color: #4361ee; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="container">
  <h1>Gov Crawler - 测试页面</h1>

  <div class="card">
    <h2>选择目标站点</h2>
    <div class="config-row">
      <label>预设站点:</label>
      <select id="presetSelect" onchange="onPresetChange()">
        <option value="">-- 请选择 --</option>
      </select>
    </div>
    <div class="config-row">
      <label>自定义 URL:</label>
      <input id="customUrl" placeholder="或手动输入任意政府网站列表页 URL">
    </div>
    <p class="hint">选择一个预设站点，或输入自定义 URL。自定义 URL 优先级更高。</p>
  </div>

  <div class="card">
    <h2>操作</h2>
    <div id="statusBar" class="status-bar status-idle">
      <span id="statusDot" class="status-dot dot-idle"></span>
      <span id="statusText">就绪</span>
      <span id="progressText" style="margin-left:12px;font-size:13px;"></span>
      <span id="taskIdTag" class="task-id-tag" style="display:none;"></span>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" id="btnCrawl" onclick="startCrawl()">开始爬取</button>
      <button class="btn btn-danger" id="btnRefresh" onclick="refreshResults()">刷新结果</button>
    </div>
  </div>

  <div class="card">
    <h2>结果 (<span id="resultCount">0</span> 篇)</h2>
    <div id="resultsArea">
      <p style="color:#888;">选择一个站点或输入 URL，点击"开始爬取"</p>
    </div>
  </div>
</div>

<script>
let pollTimer = null;
let currentTaskId = null;

const STATUS_LABELS = { idle: '就绪', pending: '排队中', running: '运行中', finished: '已完成', failed: '失败' };

async function loadSources() {
  try {
    const resp = await fetch('/api/sources');
    const data = await resp.json();
    const select = document.getElementById('presetSelect');
    for (const src of data.sources) {
      const opt = document.createElement('option');
      opt.value = src.url;
      opt.textContent = src.label || src.name;
      opt.title = src.desc || '';
      select.appendChild(opt);
    }
  } catch(e) {
    console.error('加载站点列表失败:', e);
    const sources = [
      { label: '财政部税政司 - 政策发布', url: 'https://szs.mof.gov.cn/zhengcefabu/' },
      { label: '中央网信办 - 网信发布', url: 'https://www.cac.gov.cn/wxzw/wxfb/A093702index_1.htm' },
    ];
    const select = document.getElementById('presetSelect');
    for (const src of sources) {
      const opt = document.createElement('option');
      opt.value = src.url;
      opt.textContent = src.label;
      select.appendChild(opt);
    }
  }
}

function onPresetChange() {
  const val = document.getElementById('presetSelect').value;
  if (val) {
    document.getElementById('customUrl').value = val;
  }
}

function getTargetUrl() {
  const custom = document.getElementById('customUrl').value.trim();
  return custom || '';
}

async function startCrawl() {
  const url = getTargetUrl();
  if (!url) {
    alert('请选择预设站点或输入自定义 URL');
    return;
  }
  if (!url.startsWith('http')) {
    alert('URL 必须以 http:// 或 https:// 开头');
    return;
  }

  const btn = document.getElementById('btnCrawl');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const resp = await fetch('/api/crawl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url }),
    });
    const data = await resp.json();

    currentTaskId = data.task_id;
    document.getElementById('taskIdTag').textContent = 'Task: ' + currentTaskId;
    document.getElementById('taskIdTag').style.display = 'inline-block';

    btn.textContent = '爬取中...';
    updateStatusBar('pending', '任务已加入队列');
    startPolling();
  } catch(e) {
    alert('启动失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = '开始爬取';
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollStatus, 3000);
  pollStatus();
}

async function pollStatus() {
  if (!currentTaskId) return;
  try {
    const resp = await fetch('/api/status?task_id=' + currentTaskId);
    const data = await resp.json();
    updateStatusBar(data.status, data.progress);

    const btn = document.getElementById('btnCrawl');
    if (data.status === 'pending' || data.status === 'running') {
      btn.disabled = true;
      btn.textContent = '爬取中...';
    } else {
      btn.disabled = false;
      btn.textContent = '开始爬取';
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    if (data.status === 'finished' || data.status === 'failed') {
      await loadResults();
    }
  } catch(e) {
    console.error('轮询状态失败:', e);
  }
}

async function refreshResults() {
  if (!currentTaskId) {
    document.getElementById('resultsArea').innerHTML = '<p style="color:#888;">请先启动一次爬取</p>';
    return;
  }
  await pollStatus();
}

function updateStatusBar(status, progress) {
  const bar = document.getElementById('statusBar');
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const prog = document.getElementById('progressText');

  bar.className = 'status-bar status-' + (status || 'idle');
  dot.className = 'status-dot dot-' + (status || 'idle');
  text.textContent = STATUS_LABELS[status] || status || '就绪';
  prog.textContent = progress || '';
}

async function loadResults() {
  if (!currentTaskId) return;
  try {
    const resp = await fetch('/api/results?task_id=' + currentTaskId);
    const data = await resp.json();
    renderAll(data.summary, data.results);
  } catch(e) {
    document.getElementById('resultsArea').innerHTML = '<p style="color:red;">加载结果失败: ' + e.message + '</p>';
  }
}

function renderAll(summary, results) {
  const area = document.getElementById('resultsArea');
  const countEl = document.getElementById('resultCount');
  let html = '';

  // 摘要卡片
  if (summary) {
    html += '<div class="summary-box"><div class="summary-label">AI 摘要</div><div>' + escapeHtml(summary) + '</div></div>';
  }

  // 文章列表
  if (!results || results.length === 0) {
    html += '<p style="color:#888;">暂无结果</p>';
    countEl.textContent = '0';
  } else {
    countEl.textContent = results.length;
    html += '<ul class="article-list">';
    for (const a of results) {
      html += '<li class="article-item">';
      // 优先用清洗后的标题
      const cleanTitle = a.cleaned && a.cleaned.title ? a.cleaned.title : (a.title || '无标题');
      html += '<div class="article-title">' + escapeHtml(cleanTitle) + '</div>';

      // 清洗后的结构化信息
      if (a.cleaned) {
        const c = a.cleaned;
        if (c.publish_date) {
          html += '<div class="article-meta"><span class="meta-label">日期: </span><span>' + escapeHtml(c.publish_date) + '</span></div>';
        }
        if (c.source) {
          html += '<div class="article-meta"><span class="meta-label">来源: </span><span>' + escapeHtml(c.source) + '</span></div>';
        }
      }

      html += '<div class="article-url">' + escapeHtml(a.url || '') + '</div>';

      // 显示 AI 生成的摘要
      if (a.cleaned && a.cleaned.body) {
        html += '<details><summary style="cursor:pointer;color:#4361ee;font-size:13px;">查看摘要 (AI)</summary>';
        html += '<div class="article-content">' + escapeHtml(a.cleaned.body) + '</div></details>';
      } else if (a.content && a.content.result) {
        const inner = a.content.result;
        let text = '';
        if (typeof inner === 'string') {
          text = inner;
        } else if (inner.markdown) {
          text = inner.markdown;
        } else if (inner.html) {
          text = inner.html.replace(/<[^>]*>/g, '').trim();
        } else {
          text = JSON.stringify(inner);
        }
        html += '<details><summary style="cursor:pointer;color:#4361ee;font-size:13px;">查看内容</summary>';
        html += '<div class="article-content">' + escapeHtml(text).substring(0, 3000) + '</div></details>';
      }
      html += '</li>';
    }
    html += '</ul>';
  }

  area.innerHTML = html;
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadSources();
</script>
</body>
</html>
